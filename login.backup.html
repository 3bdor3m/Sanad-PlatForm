<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سند | تسجيل الدخول</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="root">
        <!-- Navbar (simplified for auth) -->
        <nav class="navbar">
            <div class="container navbar-content">
                <a class="logo-icon" href="index.html">
                    <img src="Assets/Logo-Without.png" alt="سند" height="50" />
                </a>
                <a href="index.html" class="nav-link">العودة للرئيسية</a>
            </div>
        </nav>

        <main class="auth-wrapper">
            <div class="form-container">
                <div class="form-header">
                    <h1 class="form-title">مرحباً بك مجدداً</h1>
                    <p class="form-subtitle">سجل دخولك للوصول إلى لوحة التحكم الذكية</p>
                </div>

                <form>
                    <div class="form-group">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-input" placeholder="example@company.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" class="form-input" placeholder="••••••••" required>
                    </div>

                    <!-- In-Page Error Message Container -->
                    <div id="form-error-message" class="error-banner"></div>

                    <button type="submit" class="btn-primary btn-full">تسجيل الدخول</button>
                </form>

                <div class="social-login">
                    <button class="btn-social">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c3.11 0 5.72-1.03 7.63-2.79l-3.57-2.77c-.99.66-2.26 1.05-4.06 1.05-3.12 0-5.77-2.11-6.72-4.94H2.01v3.06C3.91 19.58 7.69 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.28 13.55c-.24-.72-.38-1.49-.38-2.3s.14-1.58.38-2.3V5.89H2.01C1.28 7.34 1 8.97 1 10.75c0 1.78.28 3.41.73 4.86l3.55-2.06z"
                                fill="#FBBC05" />
                            <path
                                d="M12 4.75c1.69 0 3.21.58 4.41 1.72l3.31-3.31C17.71 1.03 15.1 0 12 0 7.69 0 3.91 3.42 2.01 7.69l3.55 3.06c.95-2.83 3.6-4.94 6.72-4.94z"
                                fill="#EA4335" />
                        </svg>
                        متابعة باستخدام جوجل
                    </button>
                    <button class="btn-social">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
                                fill="#1877F2" />
                        </svg>
                        متابعة باستخدام فيسبوك
                    </button>
                </div>

                <div class="auth-footer">
                    ليس لديك حساب؟ <a href="#">إنشاء حساب جديد</a>
                </div>
            </div>
        </main>

        <footer class="footer-bottom" style="border: none; padding: 2rem 0;">
            <p class="footer-copyright">© 2026 سند. جميع الحقوق محفوظة.</p>
        </footer>
    </div>
</body>

</html>
